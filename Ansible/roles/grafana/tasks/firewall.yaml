- name: Allow HTTPS traffic in UFW
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: get instance info
  vultr.cloud.instance_info:
    region: "fra"
    label: "app"
    api_key: "{{ vultr.api_key }}"
  register: instance_app

- name: Set App IP Fact
  set_fact:
    app_ip: "{{ (instance_app.vultr_instance_info | map(attribute='internal_ip') | first) | default(none) }}"

- name: Allow Loki traffic in UFW
  community.general.ufw:
    rule: allow
    port: '3100'
    proto: tcp
    direction: in
    src: "{{ app_ip }}"
  when: app_ip is not none

- name: Allow Prometheus traffic in UFW
  community.general.ufw:
    rule: allow
    port: '9090'
    proto: tcp
    direction: in
    src: "{{ app_ip }}"
  when: app_ip is not none